<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Secure Multi-User Calculator Vault</title>

<style>
body{
    margin:0;
    font-family:Arial;
    background:linear-gradient(135deg,#1e1e2f,#151528);
    color:white;
}
.center{
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
}
.container{
    width:360px;
    background:#222;
    padding:20px;
    border-radius:15px;
    box-shadow:0 0 25px #000;
}
input,button{
    width:100%;
    padding:10px;
    margin:6px 0;
    border:none;
    border-radius:8px;
    font-size:16px;
}
button{
    background:#4CAF50;
    color:white;
    cursor:pointer;
}
button:hover{ background:#45a049; }

.display{
    height:55px;
    background:black;
    text-align:right;
    padding:10px;
    font-size:22px;
    border-radius:8px;
}

.grid{
    display:grid;
    grid-template-columns:repeat(4,1fr);
    gap:8px;
}

#calculator,#vaultPage{ display:none; }

#vaultPage{ padding:20px; }

.photoGrid{
    display:grid;
    grid-template-columns:repeat(auto-fill,minmax(120px,1fr));
    gap:10px;
    margin-top:15px;
}
.photoGrid img{
    width:100%;
    border-radius:10px;
    cursor:pointer;
}

.actionBtn{
    margin-top:5px;
    font-size:14px;
}

.deleteBtn{ background:red; }
.downloadBtn{ background:#2196F3; }

.storageInfo{
    margin-top:10px;
    font-size:14px;
    color:#aaa;
}

/* FULLSCREEN VIEWER */
#imageViewer{
    display:none;
    position:fixed;
    top:0;
    left:0;
    width:100%;
    height:100%;
    background:rgba(0,0,0,0.95);
    justify-content:center;
    align-items:center;
    z-index:9999;
    flex-direction:column;
}
#imageViewer img{
    max-width:95%;
    max-height:90%;
    border-radius:12px;
    box-shadow:0 0 30px black;
}
.closeBtn{
    position:absolute;
    top:20px;
    right:20px;
    background:red;
    color:white;
    border:none;
    padding:10px 15px;
    border-radius:8px;
    font-size:18px;
    cursor:pointer;
}
</style>
</head>

<body>

<!-- AUTH -->
<div class="center" id="auth">
<div class="container">
<h2>Create Account</h2>
<input type="text" id="username" placeholder="Username">
<input type="password" id="password" placeholder="Password">
<button onclick="createAccount()">Create Account</button>

<h2>Sign In</h2>
<input type="text" id="loginUser" placeholder="Username">
<input type="password" id="loginPass" placeholder="Password">
<button onclick="login()">Sign In</button>
</div>
</div>

<!-- CALCULATOR -->
<div class="center" id="calculator">
<div class="container">
<h2>Secure Calculator</h2>
<div class="display" id="display"></div>

<div class="grid">
<button onclick="press('7')">7</button>
<button onclick="press('8')">8</button>
<button onclick="press('9')">9</button>
<button onclick="press('/')">/</button>

<button onclick="press('4')">4</button>
<button onclick="press('5')">5</button>
<button onclick="press('6')">6</button>
<button onclick="press('*')">*</button>

<button onclick="press('1')">1</button>
<button onclick="press('2')">2</button>
<button onclick="press('3')">3</button>
<button onclick="press('-')">-</button>

<button onclick="press('0')">0</button>
<button onclick="press('.')">.</button>
<button onclick="calculate()">=</button>
<button onclick="press('+')">+</button>

<button onclick="clearDisplay()">C</button>
<button onclick="scientific('sqrt')">√</button>
<button onclick="scientific('pow')">x²</button>
<button onclick="logout()">Logout</button>
</div>
</div>
</div>

<!-- VAULT -->
<div id="vaultPage">
<h2>🔐 Hidden Photo Vault</h2>
<button onclick="goBack()">⬅ Back</button>
<button onclick="clearVault()" style="background:orange;">Clear My Vault</button>

<input type="file" accept="image/*" multiple onchange="uploadPhotos(event)">
<div class="storageInfo" id="storageInfo"></div>

<div class="photoGrid" id="photoContainer"></div>
</div>

<!-- FULLSCREEN IMAGE VIEWER -->
<div id="imageViewer" onclick="closeViewer()">
<button class="closeBtn">✖</button>
<img id="fullImage">
</div>

<script>
let display=document.getElementById("display");
let secretInput="";
let currentUser=null;

/* ACCOUNT SYSTEM */
function createAccount(){
    let user=username.value.trim();
    let pass=password.value.trim();
    if(!user || !pass) return alert("Fill all details");

    let users=JSON.parse(localStorage.getItem("users")||"{}");
    if(users[user]) return alert("Username exists");

    users[user]=pass;
    localStorage.setItem("users",JSON.stringify(users));
    alert("Account Created");
}

function login(){
    let user=loginUser.value.trim();
    let pass=loginPass.value.trim();

    let users=JSON.parse(localStorage.getItem("users")||"{}");
    if(users[user] && users[user]===pass){
        currentUser=user;
        auth.style.display="none";
        calculator.style.display="flex";
    }else{
        alert("Wrong Credentials");
    }
}

function logout(){
    currentUser=null;
    location.reload();
}

/* CALCULATOR */
function press(val){
    display.innerText+=val;
    secretInput+=val;

    if(secretInput.includes("777")){
        openVault();
    }
    if(secretInput.length>3)
        secretInput=secretInput.slice(-3);
}

function calculate(){
    try{ display.innerText=eval(display.innerText); }
    catch{ display.innerText="Error"; }
}

function clearDisplay(){ display.innerText=""; }

function scientific(type){
    let value=parseFloat(display.innerText);
    if(isNaN(value)) return;
    if(type==="sqrt") display.innerText=Math.sqrt(value);
    if(type==="pow") display.innerText=Math.pow(value,2);
}

/* VAULT */
function getUserKey(){ return "photos_"+currentUser; }

function openVault(){
    calculator.style.display="none";
    vaultPage.style.display="block";
    loadPhotos();
}

function goBack(){
    vaultPage.style.display="none";
    calculator.style.display="flex";
}

function uploadPhotos(event){
    let files=Array.from(event.target.files);
    let photos=JSON.parse(localStorage.getItem(getUserKey())||"[]");

    files.forEach(file=>{
        let reader=new FileReader();
        reader.onload=function(e){
            let img=new Image();
            img.src=e.target.result;
            img.onload=function(){
                let canvas=document.createElement("canvas");
                let ctx=canvas.getContext("2d");

                let MAX_WIDTH=800;
                let scale=MAX_WIDTH/img.width;
                canvas.width=MAX_WIDTH;
                canvas.height=img.height*scale;

                ctx.drawImage(img,0,0,canvas.width,canvas.height);
                let compressed=canvas.toDataURL("image/jpeg",0.7);

                photos.push(compressed);
                try{
                    localStorage.setItem(getUserKey(),JSON.stringify(photos));
                    loadPhotos();
                }catch{
                    alert("Storage full.");
                }
            }
        }
        reader.readAsDataURL(file);
    });
}

function loadPhotos(){
    let container=document.getElementById("photoContainer");
    container.innerHTML="";
    let photos=JSON.parse(localStorage.getItem(getUserKey())||"[]");

    updateStorageInfo(photos);

    photos.forEach((photo,index)=>{
        let wrapper=document.createElement("div");

        let img=document.createElement("img");
        img.src=photo;
        img.onclick=function(){
            openViewer(photo);
        };

        let download=document.createElement("button");
        download.innerText="Download";
        download.className="actionBtn downloadBtn";
        download.onclick=function(e){
            e.stopPropagation();
            fetch(photo)
            .then(res=>res.blob())
            .then(blob=>{
                let url=URL.createObjectURL(blob);
                let a=document.createElement("a");
                a.href=url;
                a.download="secret_photo_"+index+".jpg";
                document.body.appendChild(a);
                a.click();
                document.body.removeChild(a);
                URL.revokeObjectURL(url);
            });
        };

        let del=document.createElement("button");
        del.innerText="Delete";
        del.className="actionBtn deleteBtn";
        del.onclick=function(e){
            e.stopPropagation();
            photos.splice(index,1);
            localStorage.setItem(getUserKey(),JSON.stringify(photos));
            loadPhotos();
        };

        wrapper.appendChild(img);
        wrapper.appendChild(download);
        wrapper.appendChild(del);
        container.appendChild(wrapper);
    });
}

function clearVault(){
    if(confirm("Delete all photos?")){
        localStorage.removeItem(getUserKey());
        loadPhotos();
    }
}

function updateStorageInfo(photos){
    let totalSize=new Blob(photos).size/1024/1024;
    storageInfo.innerText="Storage used: "+totalSize.toFixed(2)+" MB (Limit ~5MB)";
}

/* FULLSCREEN VIEWER */
function openViewer(src){
    document.getElementById("fullImage").src=src;
    document.getElementById("imageViewer").style.display="flex";
}
function closeViewer(){
    document.getElementById("imageViewer").style.display="none";
}
</script>

</body>
</html>
